# Edit this file directly before sending/running the demo.
# Credential fields are intentionally blank.

server.port=9999
server.address=0.0.0.0

vnpay.tmn-code=
vnpay.secret-key=
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:9999/vnpay/vnpay-return
vnpay.api-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

logging.level.com.vnpay.springboot=INFO

spring.datasource.url=jdbc:h2:file:./data/vnpay-demo-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

vnpay.audit.retention-days=60
vnpay.audit.cleanup-cron=0 0 3 * * *