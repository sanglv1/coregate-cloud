<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kết Quả Truy Vấn Giao Dịch VNPAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/vnpay-demo.css}">
    <style>
        .page-shell { max-width: 840px; margin: 0 auto; }
        .card-elevated { border-radius: 14px; }
        .section-title { font-weight: 600; }
        pre { background-color: #f4f6f9; padding: 16px; border-radius: 10px; }
    </style>
</head>
<body class="vnpay-demo py-5">

<div class="page-shell container">
    <div class="text-center mb-4">
        <h1 class="section-title mb-1">Kết quả truy vấn giao dịch</h1>
        <p class="text-muted mb-0">Phản hồi trực tiếp từ API VNPay.</p>
    </div>

    <div class="card-elevated p-4">
        <div class="text-center mb-3">
            <img th:src="@{/vnpay-logo.png}" alt="VNPAY" style="width: 90px;">
        </div>

        <div class="alert alert-primary" role="alert">
            Dữ liệu phản hồi dưới đây là chuỗi JSON thô được gửi về từ cổng VNPAY.
        </div>

        <p class="fw-semibold mb-2">Chuỗi JSON (`queryResult`):</p>
        <pre th:text="${queryResult}"></pre>

        <div class="mt-4 d-flex flex-column flex-md-row gap-2">
            <a th:href="@{/vnpay/query}" class="btn btn-primary flex-fill">Truy vấn giao dịch khác</a>
            <a th:href="@{/}" class="btn btn-outline-secondary flex-fill">Về menu chính</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
