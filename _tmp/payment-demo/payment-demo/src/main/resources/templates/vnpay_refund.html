<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoàn tiền Giao dịch - VNPAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/vnpay-demo.css}">
    <style>
        .page-shell { max-width: 720px; margin: 0 auto; }
        .card-elevated { border-radius: 14px; }
        .section-title { font-weight: 600; }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.2rem rgba(0, 82, 204, 0.15);
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="vnpay-demo py-5">

<div class="page-shell container">
    <div class="text-center mb-4">
        <h1 class="section-title mb-1">Hoàn tiền giao dịch</h1>
        <p class="text-muted mb-0">Gửi yêu cầu hoàn tiền giao dịch VNPay.</p>
    </div>

    <div class="card-elevated p-4">
        <div class="text-center mb-3">
            <img th:src="@{/vnpay-logo.png}" alt="VNPAY" style="width: 90px;">
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/vnpay/process-refund}" method="post">
            <div class="row g-3">
                <div class="col-12">
                    <label for="txnRef" class="form-label">Mã đơn hàng (TxnRef)</label>
                    <input type="text" class="form-control" id="txnRef" name="txnRef" required
                           placeholder="Mã đơn hàng gốc"/>
                </div>
                <div class="col-12">
                    <label for="transactionNo" class="form-label">Mã giao dịch VNPAY (vnp_TransactionNo)</label>
                    <input type="text" class="form-control" id="transactionNo" name="transactionNo" required
                           placeholder="Lấy từ kết quả thanh toán thành công"/>
                </div>
                <div class="col-12">
                    <label for="amount" class="form-label">Số tiền hoàn (VNĐ)</label>
                    <input type="number" class="form-control" id="amount" name="amount" min="1000" required />
                </div>
                <div class="col-12">
                    <label for="transDate" class="form-label">Ngày GD gốc (yyyyMMddHHmmss)</label>
                    <input type="text" class="form-control" id="transDate" name="transDate" required
                           placeholder="Ngày thanh toán thành công"/>
                </div>
                <div class="col-12">
                    <label for="transType" class="form-label">Loại hoàn tiền (vnp_TransactionType)</label>
                    <select class="form-select" id="transType" name="transType">
                        <option value="02" selected>Hoàn toàn bộ</option>
                        <option value="03">Hoàn một phần</option>
                    </select>
                </div>
                <div class="col-12">
                    <label for="createBy" class="form-label">Người yêu cầu (vnp_CreateBy)</label>
                    <input type="text" class="form-control" id="createBy" name="createBy" required
                           placeholder="Nhập tên người dùng hoặc ID"/>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary w-100">Thực hiện hoàn tiền</button>
            </div>
        </form>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-outline-secondary w-100">Về menu chính</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
