<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kết quả thanh toán - VNPAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/vnpay-demo.css}">
    <style>
        .page-shell { max-width: 720px; margin: 0 auto; }
        .card-elevated { border-radius: 14px; }
        .section-title { font-weight: 600; }
        .status-success { color: #0f9d58; font-weight: 600; }
        .status-fail { color: #d93025; font-weight: 600; }
    </style>
</head>
<body class="vnpay-demo py-5">

<div class="page-shell container">
    <div class="text-center mb-4">
        <h1 class="section-title mb-1">Kết quả thanh toán</h1>
        <p class="text-muted mb-0">Thông tin trả về từ VNPAY.</p>
    </div>

    <div class="card-elevated p-4">
        <div class="text-center mb-3">
            <img th:src="@{/vnpay-logo.png}" alt="VNPAY" style="width: 90px;">
        </div>

        <div class="alert" th:classappend="${status == 'success'} ? 'alert-success' : 'alert-danger'">
            <span th:text="${message}"></span>
        </div>

        <div class="mb-3">
            <span th:class="${signatureValid} ? 'status-success' : 'status-fail'">
                <span th:text="${signatureValid} ? 'Signature hợp lệ' : 'Signature không hợp lệ'"></span>
            </span>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <tbody>
                <tr>
                    <th>Mã giao dịch</th>
                    <td th:text="${vnp_TxnRef}"></td>
                </tr>
                <tr>
                    <th>Amount</th>
                    <td th:text="${vnp_Amount}"></td>
                </tr>
                <tr>
                    <th>Order Info</th>
                    <td th:text="${vnp_OrderInfo}"></td>
                </tr>
                <tr>
                    <th>Response Code</th>
                    <td th:text="${vnp_ResponseCode}"></td>
                </tr>
                <tr>
                    <th>Transaction Status</th>
                    <td th:text="${vnp_TransactionStatus}"></td>
                </tr>
                <tr>
                    <th>Transaction No</th>
                    <td th:text="${vnp_TransactionNo}"></td>
                </tr>
                <tr>
                    <th>Pay Date</th>
                    <td th:text="${vnp_PayDate}"></td>
                </tr>
                <tr>
                    <th>Bank Code</th>
                    <td th:text="${vnp_BankCode}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-outline-secondary w-100">Về menu chính</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
