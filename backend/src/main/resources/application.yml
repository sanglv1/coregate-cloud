server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: coregate-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coregate}
    username: ${DB_USERNAME:coregate}
    password: ${DB_PASSWORD:coregate}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    admin-username: ${ADMIN_USERNAME:sanglv}
    admin-password: ${ADMIN_PASSWORD:Sanglv@123}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@coregate.local}
  download:
    public-base-url: ${DOWNLOAD_PUBLIC_BASE_URL:http://localhost:8080}
    storage-dir: ${DOWNLOAD_STORAGE_DIR:./assets/products}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment-callback}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/webhooks/vnpay}
    ip-address: ${VNPAY_IP_ADDRESS:127.0.0.1}
    timezone: ${VNPAY_TIMEZONE:Asia/Ho_Chi_Minh}
