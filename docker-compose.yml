services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coregate}
      POSTGRES_USER: ${POSTGRES_USER:-coregate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coregate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coregate} -d ${POSTGRES_DB:-coregate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    volumes:
      - ${DOWNLOAD_HOST_DIR:-./assets/products}:/app/products:ro
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-coregate}
      DB_USERNAME: ${POSTGRES_USER:-coregate}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-coregate}
      ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-sanglv}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Sanglv@123}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:3000/payment-callback}
      VNPAY_IPN_URL: ${VNPAY_IPN_URL:-http://localhost:8080/api/webhooks/vnpay}
      VNPAY_TIMEZONE: ${VNPAY_TIMEZONE:-Asia/Ho_Chi_Minh}
      DOWNLOAD_PUBLIC_BASE_URL: ${DOWNLOAD_PUBLIC_BASE_URL:-http://localhost:8080}
      DOWNLOAD_STORAGE_DIR: ${DOWNLOAD_STORAGE_DIR:-/app/products}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@coregate.local}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  coregate-ui:
    build:
      context: ./coregate-ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
