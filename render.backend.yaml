# Render Blueprint — CHỈ backend + Postgres (dùng kèm Vercel cho UI)
#
# Cách dùng:
# 1. Đổi tên file này thành render.yaml (hoặc copy nội dung vào render.yaml) rồi push GitHub
# 2. Render Dashboard → New → Blueprint → chọn repo
#
# UI deploy trên Vercel — xem docs/DEPLOY-VERCEL-RENDER.md

services:
  - type: web
    name: coregate-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter
    region: singapore
    healthCheckPath: /actuator/health
    disk:
      name: product-downloads
      mountPath: /app/products
      sizeGB: 5
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: DB_HOST
        fromDatabase:
          name: coregate-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: coregate-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: coregate-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: coregate-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: coregate-db
          property: password
      # Thêm URL Vercel sau bước deploy UI (phân tách bằng dấu phẩy nếu nhiều domain)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DOWNLOAD_PUBLIC_BASE_URL
        fromService:
          type: web
          name: coregate-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: DOWNLOAD_STORAGE_DIR
        value: /app/products
      - key: MAIL_ENABLED
        value: "false"
      - key: VNPAY_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_IPN_URL
        sync: false

databases:
  - name: coregate-db
    plan: basic
    region: singapore
    databaseName: coregate
    user: coregate
