# FREE: backend Render + Postgres Neon (khuyến nghị) — hướng dẫn: docs/DEPLOY-FREE.md
# Bản Render Postgres free (30 ngày): render.backend.free.yaml

services:
  - type: web
    name: coregate-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DOWNLOAD_PUBLIC_BASE_URL
        fromService:
          type: web
          name: coregate-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: DOWNLOAD_STORAGE_DIR
        value: /tmp/products
      - key: MAIL_ENABLED
        value: "false"
      - key: VNPAY_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_IPN_URL
        sync: false
